[workspace]
channels = ["conda-forge", "bioconda"]
name = "SAIGEQTL"
platforms = ["linux-64", "osx-64"]
version = "0.3.2"

[tasks]
[tasks.install-abess]
cmd = "R -q -e 'install.packages(\"abess\", repos=\"https://cloud.r-project.org\")'"

[dependencies]
r = "*"
"r-data.table" = "*"
r-dplyr = "*"
r-dbplyr = "*"
bioconductor-snpstats = ">=1.56.0,<2"
r-qqman = ">=0.1.9,<0.2"
